<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카드 뒤집기 프로토타입 - 텍스트 입력형</title>

    <!-- 🌟 [추가됨] 모바일 환경 터치 드래그 앤 드롭 지원 스크립트 -->
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>

    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
        }

        button {
            padding: 10px 15px;
            font-size: 15px;
            cursor: pointer;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background-color: #f8f8f8;
        }
        button:hover { background-color: #e0e0e0; }

        .hidden { display: none !important; }

        .section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .header-title { margin-bottom: 20px; color: #333; }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(3, 80px);
            gap: 10px;
            margin-bottom: 20px;
        }
        .input-grid input {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #ccc;
            border-radius: 8px;
        }
        .input-grid input:focus {
            outline: none;
            border-color: #2196F3;
        }

        .controls { margin-bottom: 20px; text-align: center; }
        
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 130px);
            gap: 10px;
        }

        .card {
            background-color: white;
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            cursor: grab;
            user-select: none;
            transition: border 0.2s;
            
            /* 🌟 [추가됨] 모바일에서 카드 드래그 시 화면이 스크롤되는 현상 방지 */
            touch-action: none; 
        }
        .card:active { cursor: grabbing; }

        .card.flipped {
            background-color: #888;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, #777 10px, #777 20px);
            color: transparent; 
        }
        
        .card.drag-over {
            border: 3px dashed #ff2a2a;
        }
    </style>
</head>
<body>

    <div id="setupSection" class="section">
        <h2 class="header-title">9개의 글자를 입력해주세요</h2>
        <div class="input-grid" id="inputGrid">
            <input type="text" maxlength="1" value="가">
            <input type="text" maxlength="1" value="나">
            <input type="text" maxlength="1" value="다">
            <input type="text" maxlength="1" value="라">
            <input type="text" maxlength="1" value="마">
            <input type="text" maxlength="1" value="바">
            <input type="text" maxlength="1" value="사">
            <input type="text" maxlength="1" value="아">
            <input type="text" maxlength="1" value="자">
        </div>
        <button id="createCardBtn" style="background-color: #4CAF50; color: white;">카드 생성하기</button>
    </div>

    <div id="gameSection" class="section hidden">
        <div class="controls">
            <button id="flipAllBtn">1. 모두 뒷면으로 뒤집기</button>
            <button id="restartGameBtn">처음 배치로 돌리기</button>
            <br>
            <button id="backToSetupBtn">텍스트 변경하기</button>
        </div>
        <div class="board" id="board">
            <!-- 카드가 렌더링될 위치 -->
        </div>
        <p style="color: #666; font-size: 14px; margin-top: 15px; text-align: center; padding: 0 10px;">
            안내: 카드를 손가락(마우스)으로 길게 눌러 끌어서<br>서로 위치를 바꿀 수 있습니다.<br>클릭(터치)하면 다시 오픈됩니다.
        </p>
    </div>

    <script>
        // 자바스크립트 로직은 이전과 100% 동일하게 유지됩니다. 
        // 외부 스크립트가 알아서 터치를 드래그로 변환해줍니다.
        
        const setupSection = document.getElementById('setupSection');
        const gameSection = document.getElementById('gameSection');
        const board = document.getElementById('board');
        const inputs = document.querySelectorAll('.input-grid input');

        let currentChars = []; 
        let draggedCard = null;

        function createBoard() {
            board.innerHTML = '';
            
            currentChars.forEach((char) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerText = char || ' '; 
                card.draggable = true; 

                card.addEventListener('click', function() {
                    this.classList.remove('flipped');
                });

                card.addEventListener('dragstart', function() {
                    draggedCard = this;
                    setTimeout(() => this.style.opacity = '0.4', 0);
                });
                
                card.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    this.classList.add('drag-over');
                });
                
                card.addEventListener('dragleave', function() {
                    this.classList.remove('drag-over');
                });
                
                card.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.classList.remove('drag-over');
                    
                    if (this !== draggedCard && draggedCard !== null) {
                        let tempText = this.innerText;
                        this.innerText = draggedCard.innerText;
                        draggedCard.innerText = tempText;

                        let thisFlipped = this.classList.contains('flipped');
                        let draggedFlipped = draggedCard.classList.contains('flipped');
                        if (thisFlipped !== draggedFlipped) {
                            this.classList.toggle('flipped');
                            draggedCard.classList.toggle('flipped');
                        }
                    }
                });
                
                card.addEventListener('dragend', function() {
                    this.style.opacity = '1';
                    draggedCard = null;
                });

                board.appendChild(card);
            });
        }

        document.getElementById('createCardBtn').addEventListener('click', () => {
            currentChars = Array.from(inputs).map(input => input.value);
            setupSection.classList.add('hidden');
            gameSection.classList.remove('hidden');
            createBoard();
        });

        document.getElementById('flipAllBtn').addEventListener('click', () => {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => card.classList.add('flipped'));
        });

        document.getElementById('restartGameBtn').addEventListener('click', () => {
            createBoard(); 
        });

        document.getElementById('backToSetupBtn').addEventListener('click', () => {
            gameSection.classList.add('hidden');
            setupSection.classList.remove('hidden');
        });

    </script>
</body>
</html>
